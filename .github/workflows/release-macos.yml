name: Release Desktop Builds

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS DMG
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install Tauri CLI v2
        run: cargo install tauri-cli --version "^2.10" --locked

      - name: Verify Rust Build
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Build DMG (macOS)
        id: build_dmg
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/build_dmg_tauri2.sh
          DMG_PATH="$(bash scripts/build_dmg_tauri2.sh | tail -n 1)"
          if [[ ! -f "$DMG_PATH" ]]; then
            echo "DMG artifact not found at: $DMG_PATH" >&2
            exit 1
          fi
          echo "dmg_path=$DMG_PATH" >> "$GITHUB_OUTPUT"

      - name: Prepare macOS Artifact Metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          DMG_PATH="${{ steps.build_dmg.outputs.dmg_path }}"
          SHA_FILE="${DMG_PATH}.sha256"
          shasum -a 256 "$DMG_PATH" > "$SHA_FILE"
          echo "sha_file=$SHA_FILE" >> "$GITHUB_OUTPUT"

      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: |
            ${{ steps.build_dmg.outputs.dmg_path }}
            ${{ steps.meta.outputs.sha_file }}
          if-no-files-found: error
          retention-days: 14

  build-windows:
    name: Build Windows MSI
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install Tauri CLI v2
        shell: pwsh
        run: cargo install tauri-cli --version "^2.10" --locked

      - name: Verify Rust Build
        shell: pwsh
        run: cargo check --manifest-path src-tauri/Cargo.toml

      - name: Build MSI (Windows)
        shell: pwsh
        working-directory: src-tauri
        run: cargo tauri build --bundles msi

      - name: Prepare Windows Artifact Metadata
        id: meta
        shell: pwsh
        run: |
          $msi = Get-ChildItem "src-tauri/target/release/bundle/msi/*.msi" | Select-Object -First 1
          if (-not $msi) {
            Write-Error "MSI artifact not found"
            exit 1
          }
          $shaFile = "$($msi.FullName).sha256"
          $hash = (Get-FileHash -Algorithm SHA256 -Path $msi.FullName).Hash.ToLower()
          "$hash  $($msi.Name)" | Out-File -FilePath $shaFile -Encoding ascii
          "msi_path=$($msi.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "sha_file=$shaFile" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: |
            ${{ steps.meta.outputs.msi_path }}
            ${{ steps.meta.outputs.sha_file }}
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish Release
    needs:
      - build-macos
      - build-windows
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download macOS Artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-macos
          path: release-assets/macos

      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-windows
          path: release-assets/windows

      - name: Prepare Release Tag
        id: release_meta
        shell: bash
        run: |
          set -euo pipefail
          TAG="build-$(TZ=Asia/Shanghai date +'%Y-%m-%d')"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Move Daily Tag To Current Commit
        shell: bash
        run: |
          set -euo pipefail
          TAG="${{ steps.release_meta.outputs.tag }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -f "$TAG" "$GITHUB_SHA"
          git push origin "refs/tags/$TAG" --force

      - name: Publish / Update Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_meta.outputs.tag }}
          name: Send2Boox Desktop ${{ steps.release_meta.outputs.tag }}
          body: |
            Automated desktop build.

            - Tag is date-based in Asia/Shanghai timezone.
            - Multiple builds in one day reuse and update the same tag/release.
            - Includes macOS DMG and Windows MSI artifacts.
          files: |
            release-assets/**/*.dmg
            release-assets/**/*.msi
            release-assets/**/*.sha256
          draft: false
          prerelease: false
          allow_updates: true
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
