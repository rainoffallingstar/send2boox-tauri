<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Send2Boox 控制中心</title>
    <link rel="stylesheet" href="./dashboard.css" />
  </head>
  <body>
    <div class="window-shell">
      <div class="window-chrome"></div>
      <main class="app-layout">
        <aside class="sidebar">
          <div class="sidebar-top">
            <div class="app-brand">
              <div class="app-brand-mark" aria-hidden="true">
                <svg viewBox="0 0 64 64" role="img" focusable="false">
                  <defs>
                    <linearGradient id="brand-bg" x1="12%" y1="10%" x2="88%" y2="92%">
                      <stop offset="0%" stop-color="#0A84FF"></stop>
                      <stop offset="56%" stop-color="#4A97FF"></stop>
                      <stop offset="100%" stop-color="#29D988"></stop>
                    </linearGradient>
                  </defs>
                  <rect x="6" y="6" width="52" height="52" rx="15" fill="url(#brand-bg)"></rect>
                  <path d="M21 17h13l8 8v17c0 2.761-2.239 5-5 5H21c-2.761 0-5-2.239-5-5V22c0-2.761 2.239-5 5-5z" fill="#FFFFFF" fill-opacity="0.96"></path>
                  <path d="M34 17v7a3 3 0 0 0 3 3h7z" fill="#DDF0FF"></path>
                  <rect x="23" y="30" width="10" height="2.8" rx="1.4" fill="#D6E8FF"></rect>
                  <rect x="23" y="36" width="14" height="2.8" rx="1.4" fill="#D6E8FF"></rect>
                  <path d="M39 39c4.8-.8 8.7-3.4 11.6-8.1" fill="none" stroke="#FFFFFF" stroke-width="4.6" stroke-linecap="round"></path>
                  <circle cx="52" cy="27" r="3.8" fill="#FFFFFF"></circle>
                </svg>
              </div>
              <div class="app-brand-copy">
                <p class="app-caption">Send2Boox</p>
                <h1>控制中心</h1>
              </div>
            </div>

            <section class="sidebar-card account-card">
              <div class="sidebar-card-head">
                <span class="sidebar-label">账户</span>
                <span id="auth-chip" class="status-chip pending">初始化中</span>
              </div>
              <p id="sidebar-profile-name" class="account-name">未登录</p>
              <p id="sidebar-profile-subtitle" class="account-subtitle">正在检查本地授权状态…</p>
              <div class="sidebar-actions">
                <button id="sidebar-login-btn" class="button button-primary" type="button">浏览器登录</button>
                <button id="sidebar-upload-btn" class="button button-secondary" type="button">上传文件</button>
              </div>
            </section>

            <nav class="sidebar-nav" aria-label="主导航">
              <button class="nav-item" data-view="overview" type="button">
                <span class="nav-item-title">概览</span>
                <span class="nav-item-subtitle">摘要与状态</span>
              </button>
              <button class="nav-item" data-view="push" type="button">
                <span class="nav-item-title">互动文件</span>
                <span class="nav-item-subtitle">推送与上传</span>
              </button>
              <button class="nav-item" data-view="devices" type="button">
                <span class="nav-item-title">设备</span>
                <span class="nav-item-subtitle">局域网与在线设备</span>
              </button>
              <button class="nav-item" data-view="reading" type="button">
                <span class="nav-item-title">阅读</span>
                <span class="nav-item-subtitle">今日与本周指标</span>
              </button>
              <button class="nav-item" data-view="zotero" type="button">
                <span class="nav-item-title">Zotero</span>
                <span class="nav-item-subtitle">附件工作流与推送</span>
              </button>
            </nav>
          </div>

          <div class="sidebar-bottom">
            <section class="sidebar-card storage-card">
              <div class="sidebar-card-head">
                <span class="sidebar-label">云空间</span>
                <span id="storage-text" class="storage-text">未知</span>
              </div>
              <div class="progress-track">
                <div id="storage-bar" class="progress-fill"></div>
              </div>
            </section>

            <section class="sidebar-card sidebar-meta-card">
              <div class="meta-row">
                <span class="sidebar-label">同步状态</span>
                <span id="sync-time" class="sync-time">刚刚</span>
              </div>
              <p id="sidebar-upload-status" class="sidebar-inline-status">上传进度: 空闲</p>
            </section>
          </div>
        </aside>

        <section class="content-shell">
          <header class="toolbar">
            <div class="toolbar-copy">
              <p id="toolbar-section-kicker" class="toolbar-kicker">概览</p>
              <div class="toolbar-title-row">
                <h2 id="toolbar-title">控制中心</h2>
                <span id="toolbar-badge" class="toolbar-badge">Native API</span>
              </div>
              <p id="toolbar-subtitle" class="toolbar-subtitle">统一查看授权状态、设备、阅读与互动文件。</p>
            </div>

            <div class="toolbar-actions">
              <label class="refresh-setting" for="refresh-interval-minutes">
                <span>自动刷新</span>
                <input
                  id="refresh-interval-minutes"
                  type="number"
                  min="0.1"
                  step="0.1"
                  inputmode="decimal"
                  value="1"
                />
                <span>分钟</span>
                <button id="refresh-apply-btn" class="button button-tertiary button-xs" type="button">应用</button>
              </label>
              <button id="toolbar-refresh-btn" class="button button-tertiary" type="button">刷新</button>
            </div>
          </header>

          <div id="content-root" class="content-root"></div>
        </section>
      </main>
    </div>
    <script src="./dashboard.js"></script>
  </body>
</html>
